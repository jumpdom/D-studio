<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DasDigital Studio | Workspace</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* PREMIUM DARK BLUE THEME */
        :root {
            --bg-color: #0b1120; /* Deep Black-Blue */
            --card-bg: #111b2d; /* Lighter Navy Blue */
            --accent-blue: #38bdf8; /* Bright Sky Blue */
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* NAVIGATION BAR */
        nav {
            width: 100%;
            background: #111b2d;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            border-bottom: 2px solid var(--accent-blue);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        /* HEADER SECTION */
        .header-section {
            text-align: center;
            padding: 50px 20px;
        }

        .header-section h1 {
            font-size: 36px;
            color: var(--accent-blue);
            margin-bottom: 10px;
            font-weight: 800;
        }

        .header-section p {
            color: var(--text-dim);
            font-size: 18px;
        }

        /* MAIN TOOL CONTAINER */
        .container {
            width: 90%;
            max-width: 450px;
            margin-bottom: 50px;
        }

        .status-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .status-card h3 {
            color: var(--accent-blue);
            margin-top: 0;
            font-size: 22px;
        }

        .status-card p {
            color: var(--text-main);
            line-height: 1.6;
            font-size: 15px;
        }

        /* INPUTS & BUTTONS */
        .tool-box {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label { color: var(--accent-blue); font-size: 13px; font-weight: 600; }

        input {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        button {
            background: var(--accent-blue);
            color: #0b1120;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .preview-img {
            width: 100px;
            height: 120px;
            object-fit: cover;
            display: none;
            margin: 10px auto;
            border: 2px solid var(--accent-blue);
            border-radius: 10px;
        }

        footer {
            padding: 20px;
            color: var(--text-dim);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Services</a>
    </nav>

    <div class="header-section">
        <h1>Welcome to My Workspace</h1>
        <p>Clean, Fast, and Secure Design</p>
    </div>

    <div class="container">
        <div class="status-card">
            <h3>Project Status</h3>
            <p>Aapka naya theme ab active hai. Ye design dark environment mein kaam karne ke liye best hai aur aankhon par zor nahi dalta.</p>
            
            <div class="tool-box">
                <label>⚖️ PHOTO KB RESIZER</label>
                <input type="file" id="kbInput" accept="image/*">
                <input type="number" id="targetKB" placeholder="Enter Target KB (Ex: 150)">
                <button onclick="resizeKB()">Optimize & Download</button>

                <hr style="border: 0.5px solid rgba(255,255,255,0.1); width:100%;">

                <label>🖼️ PASSPORT PHOTO MAKER</label>
                <input type="file" id="passInput" accept="image/*" onchange="showPreview(this)">
                <img id="passPreview" class="preview-img">
                <input type="number" id="photoQty" value="12" placeholder="Quantity">
                <button onclick="generatePassport()">Generate A4 Print</button>
            </div>
        </div>
    </div>

    <footer>MAINTAINED BY AMIT DAS</footer>

<script>
    const readFile = (file) => new Promise(res => {
        const reader = new FileReader();
        reader.onload = (e) => res(e.target.result);
        reader.readAsDataURL(file);
    });

    function showPreview(input) {
        const prev = document.getElementById('passPreview');
        if (input.files[0]) {
            prev.src = URL.createObjectURL(input.files[0]);
            prev.style.display = 'block';
        }
    }

    // KB RESIZER LOGIC
    async function resizeKB() {
        const file = document.getElementById('kbInput').files[0];
        const target = parseInt(document.getElementById('targetKB').value);
        if(!file || !target) return alert("Details bhariye!");
        
        const img = new Image();
        img.src = await readFile(file);
        img.onload = function() {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            let scale = 1.0;
            let finalData = "";
            for (let i = 0; i < 6; i++) {
                canvas.width = img.width * scale; canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                for (let q = 0.98; q > 0.1; q -= 0.05) {
                    finalData = canvas.toDataURL("image/jpeg", q);
                    if ((finalData.length * 3 / 4 / 1024) <= target) break;
                }
                if ((finalData.length * 3 / 4 / 1024) < target * 0.85) scale += 0.4; else break;
            }
            const link = document.createElement('a');
            link.href = finalData; link.download = `DasDigital_${target}KB.jpg`;
            link.click();
        };
    }

    // PASSPORT LOGIC
    async function generatePassport() {
        const file = document.getElementById('passInput').files[0];
        const qty = document.getElementById('photoQty').value || 12;
        if(!file) return alert("Photo select karein!");
        const img = new Image();
        img.src = await readFile(file);
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 2480; canvas.height = 3508;
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const pW = 413, pH = 531, gap = 45, margin = 120;
            let x = margin, y = margin;
            for (let i = 0; i < qty; i++) {
                ctx.drawImage(img, x, y, pW, pH);
                ctx.strokeStyle = "#ddd"; ctx.strokeRect(x, y, pW, pH);
                x += pW + gap;
                if (x + pW > canvas.width - margin) { x = margin; y += pH + gap; }
            }
            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.download = "DasDigital_Passport.jpg";
            link.click();
        };
    }
</script>
</body>
</html>
