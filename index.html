<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DasDigital Studio | Dark Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* DARK THEME & STABLE BACKGROUND */
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #0f172a; /* Deep Dark Blue-Grey */
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            background-attachment: fixed;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 92%;
            max-width: 480px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            padding: 30px 20px;
            border-radius: 24px;
            margin: 40px 0;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { 
            text-align: center; 
            color: #38bdf8; 
            margin-bottom: 35px; 
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .tool-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            transition: 0.3s ease;
        }

        .tool-card:hover {
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.8);
        }

        label { 
            display: block; 
            margin-bottom: 12px; 
            font-size: 14px; 
            font-weight: 600;
            color: #94a3b8; 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #f8fafc;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: #0ea5e9;
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:hover { 
            background: #0284c7; 
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .preview-box { 
            width: 90px; 
            height: 110px; 
            object-fit: cover; 
            display: none; 
            margin: 15px auto; 
            border: 2px solid #38bdf8; 
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        footer {
            margin-bottom: 20px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DAS DIGITAL STUDIO</h2>

    <div class="tool-card">
        <label>📄 Image to PDF Converter</label>
        <input type="file" id="pdfInput" accept="image/*" multiple>
        <button onclick="convertToPDF()">Export to PDF</button>
    </div>

    <div class="tool-card">
        <label>⚖️ KB Resizer (Exact Match)</label>
        <input type="file" id="kbInput" accept="image/*">
        <input type="number" id="targetKB" placeholder="Target Size in KB">
        <button onclick="resizeKB()">Resize & Download</button>
    </div>

    <div class="tool-card">
        <label>🖼️ Passport Photo Maker</label>
        <input type="file" id="passInput" accept="image/*" onchange="showPreview(this)">
        <img id="passPreview" class="preview-box">
        <input type="number" id="photoQty" value="12" placeholder="Quantity (1-40)">
        <button onclick="generatePassport()">Generate A4 Sheet</button>
    </div>
</div>

<footer>MAINTAINED BY AMIT DAS</footer>

<script>
    const readFile = (file) => new Promise(res => {
        const reader = new FileReader();
        reader.onload = (e) => res(e.target.result);
        reader.readAsDataURL(file);
    });

    function showPreview(input) {
        const prev = document.getElementById('passPreview');
        if (input.files[0]) {
            prev.src = URL.createObjectURL(input.files[0]);
            prev.style.display = 'block';
        }
    }

    // --- PDF LOGIC ---
    async function convertToPDF() {
        const files = document.getElementById('pdfInput').files;
        if (files.length === 0) return alert("Select images first!");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        for (let i = 0; i < files.length; i++) {
            const imgData = await readFile(files[i]);
            if (i > 0) doc.addPage();
            doc.addImage(imgData, 'JPEG', 10, 10, 190, 277);
        }
        doc.save("DasDigital_Doc.pdf");
    }

    // --- KB RESIZER LOGIC ---
    async function resizeKB() {
        const file = document.getElementById('kbInput').files[0];
        const target = parseInt(document.getElementById('targetKB').value);
        if (!file || !target) return alert("Missing Info!");
        const img = new Image();
        img.src = await readFile(file);
        img.onload = function() {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            let scale = 1.0, finalData = "";
            for (let i = 0; i < 6; i++) {
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                for (let q = 0.98; q > 0.1; q -= 0.05) {
                    finalData = canvas.toDataURL("image/jpeg", q);
                    let curSize = (finalData.length * 3) / 4 / 1024;
                    if (curSize <= target && curSize > target * 0.92) break;
                }
                if ((finalData.length * 3 / 4 / 1024) < target * 0.88) scale += 0.4; else break;
            }
            triggerDownload(finalData, `DasDigital_${target}KB.jpg`);
        };
    }

    // --- PASSPORT LOGIC ---
    async function generatePassport() {
        const file = document.getElementById('passInput').files[0];
        const qty = parseInt(document.getElementById('photoQty').value) || 12;
        if (!file) return alert("Select photo!");
        const img = new Image();
        img.src = await readFile(file);
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 2480; canvas.height = 3508;
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const pW = 413, pH = 531, gap = 45, margin = 120;
            let x = margin, y = margin;
            for (let i = 0; i < qty; i++) {
                ctx.drawImage(img, x, y, pW, pH);
                ctx.strokeStyle = "#e2e8f0";
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, pW, pH);
                x += pW + gap;
                if (x + pW > canvas.width - margin) { x = margin; y += pH + gap; }
            }
            triggerDownload(canvas.toDataURL("image/jpeg", 0.9), "DasDigital_Passport.jpg");
        };
    }

    function triggerDownload(url, name) {
        const link = document.createElement('a');
        link.href = url;
        link.download = name;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
