<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D Studio - Pro Image Tools</title>
    <link rel="icon" type="image/jpeg" href="IMG_6145.jpeg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        header { background: #1a1a1a; padding: 10px 30px; border-bottom: 2px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; }
        .logo-img { width: 45px; border-radius: 50%; border: 1px solid #ffcc00; }
        .container { max-width: 700px; margin: 20px auto; padding: 15px; }
        .tool-card { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; text-align: left; }
        h3 { color: #ffcc00; border-bottom: 1px solid #333; padding-bottom: 8px; margin-top: 0; }
        input, select { background: #262626; color: #fff; padding: 10px; border: 1px solid #444; border-radius: 5px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(45deg, #ffcc00, #ff9900); color: #000; border: none; padding: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; font-size: 15px; margin-top: 10px; }
        .person-entry { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #ffcc00; }
        .add-more { background: #28a745; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-bottom: 10px; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <img src="IMG_6145.jpeg" alt="Logo" class="logo-img">
    <div style="font-weight: bold; color: #ffcc00; font-size: 20px;">D STUDIO</div>
    <i class="fas fa-question-circle" style="color:#ffcc00; font-size:20px; cursor:pointer;" onclick="alert('Help: Select images and click the gold button.')"></i>
</header>

<div class="container">
    <h1 style="color:#ffcc00; margin-bottom:5px;">D STUDIO PRO</h1>
    <p style="color:#888; font-size:14px; margin-bottom:25px;">The Moon Photography | Amit Das</p>

    <!-- PDF Tool -->
    <div class="tool-card">
        <h3><i class="fas fa-file-pdf"></i> Image to PDF (Fit)</h3>
        <input type="file" id="pdfIn" multiple accept="image/*">
        <button class="btn-gold" onclick="makePDF()">DOWNLOAD PDF</button>
    </div>

    <!-- Resize Tool -->
    <div class="tool-card">
        <h3><i class="fas fa-compress"></i> Resize by KB</h3>
        <input type="file" id="resIn" accept="image/*">
        <input type="number" id="kbSize" placeholder="Enter Target KB (e.g. 50)">
        <button class="btn-gold" onclick="resKB()">DOWNLOAD RESIZED IMAGE</button>
    </div>

    <!-- Passport Tool -->
    <div class="tool-card">
        <h3><i class="fas fa-users"></i> Multi-Person Passport (A4)</h3>
        <div id="peopleList">
            <div class="person-entry">
                <input type="file" class="p-file" accept="image/*">
                <input type="number" class="p-qty" value="1" min="1" placeholder="Quantity">
            </div>
        </div>
        <button class="add-more" onclick="addPerson()">+ Add Person</button>
        <select id="pSize">
            <option value="p">Passport Size (3.5x4.5cm)</option>
            <option value="s">Stamp Size (2x2.5cm)</option>
        </select>
        <button class="btn-gold" onclick="makeA4()">DOWNLOAD A4 SHEET</button>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;

    function read(f) { return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); }); }
    function dl(u, n) { const a = document.createElement('a'); a.href = u; a.download = n; document.body.appendChild(a); a.click(); document.body.removeChild(a); }

    async function makePDF() {
        const files = document.getElementById('pdfIn').files;
        if(!files.length) return alert("Select images!");
        let pdf;
        for(let i=0; i<files.length; i++) {
            const data = await read(files[i]);
            const img = new Image(); img.src = data;
            await new Promise(r => img.onload = r);
            const ori = img.width > img.height ? 'l' : 'p';
            if(i===0) pdf = new jsPDF({orientation:ori, unit:'px', format:[img.width, img.height]});
            else pdf.addPage([img.width, img.height], ori);
            pdf.addImage(data, 'JPEG', 0, 0, img.width, img.height);
        }
        pdf.save("D-Studio-Doc.pdf");
    }

    async function resKB() {
        const file = document.getElementById('resIn').files[0];
        const target = parseInt(document.getElementById('kbSize').value);
        if(!file || !target) return alert("Select file and KB!");
        const data = await read(file);
        const img = new Image(); img.src = data;
        img.onload = () => {
            const cvs = document.createElement('canvas');
            cvs.width = img.width; cvs.height = img.height;
            cvs.getContext('2d').drawImage(img,0,0);
            let q = 0.9, res = "";
            for(let i=0; i<10; i++) {
                res = cvs.toDataURL("image/jpeg", q);
                if((res.length * 0.75 / 1024) <= target) break;
                q -= 0.1;
            }
            dl(res, "resized.jpg");
        };
    }

    function addPerson() {
        const div = document.createElement('div');
        div.className = 'person-entry';
        div.innerHTML = `<input type="file" class="p-file" accept="image/*"><input type="number" class="p-qty" value="1" min="1">`;
        document.getElementById('peopleList').appendChild(div);
    }

    async function makeA4() {
        const entries = document.querySelectorAll('.person-entry');
        const mode = document.getElementById('pSize').value;
        const cvs = document.createElement('canvas');
        cvs.width = 2480; cvs.height = 3508; // A4 Size
        const ctx = cvs.getContext('2d');
        ctx.fillStyle = "#fff"; ctx.fillRect(0,0,cvs.width, cvs.height);
        let w = mode==='p'?413:236, h = mode==='p'?531:295;
        let x=60, y=60;
        for(let ent of entries) {
            const f = ent.querySelector('.p-file').files[0];
            const q = parseInt(ent.querySelector('.p-qty').value);
            if(f && q > 0) {
                const data = await read(f);
                const img = new Image(); img.src = data;
                await new Promise(r => img.onload = r);
                for(let i=0; i<q; i++) {
                    if(x+w > cvs.width-60) { x=60; y+=h+40; }
                    ctx.drawImage(img,x,y,w,h);
                    ctx.strokeStyle="#000"; ctx.strokeRect(x,y,w,h);
                    x+=w+40;
                }
            }
        }
        dl(cvs.toDataURL("image/jpeg", 0.9), "D-Studio-A4.jpg");
    }
</script>
</body>
</html>
