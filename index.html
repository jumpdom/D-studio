<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D Studio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

/* HEADER */
.header{
background:#111;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:2px solid #ffcc00;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:45px;
}

.title{
font-size:22px;
color:#ffcc00;
font-weight:bold;
}

.icons i{
color:#ffcc00;
margin-left:15px;
font-size:18px;
}

/* HERO */
.hero{
text-align:center;
padding:20px;
}

.hero h2{
color:#ffcc00;
margin-bottom:5px;
}

.hero p{
color:#aaa;
font-size:13px;
}

/* CARD */
.card{
background:#151515;
margin:15px;
padding:20px;
border-radius:15px;
border:1px solid #222;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card h3{
color:#ffcc00;
margin-bottom:15px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #333;
background:#222;
color:#fff;
}

/* BUTTON */
.btn{
margin-top:15px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
background:linear-gradient(45deg,#ffcc00,#ff9900);
cursor:pointer;
}

/* PERSON */
.person{
background:#1f1f1f;
padding:10px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">
<img src="IMG_6239.jpeg">
<div class="title">D STUDIO</div>
</div>

<div class="icons">
<i class="fas fa-home"></i>
<i class="fas fa-question-circle"></i>
</div>
</div>

<!-- HERO -->
<div class="hero">
<h2>India's No. 1 Digital Photo Tools</h2>
<p>Maintained by Amit Das | Free online tools</p>
</div>

<!-- PDF -->
<div class="card">
<h3><i class="fas fa-file-pdf"></i> Image to PDF (No Border)</h3>
<input type="file" id="pdfInput" multiple accept="image/*">
<button class="btn" onclick="generatePDF()">DOWNLOAD PDF</button>
</div>

<!-- RESIZE -->
<div class="card">
<h3><i class="fas fa-expand"></i> HD Resize (KB Control)</h3>
<input type="file" id="resizeInput" accept="image/*">
<input type="number" id="targetKB" placeholder="Target KB (e.g. 100)">
<button class="btn" onclick="resizeByKB()">RESIZE & DOWNLOAD</button>
</div>

<!-- PASSPORT -->
<div class="card">
<h3><i class="fas fa-id-card"></i> Passport Sheet</h3>

<div id="peopleList">
<div class="person">
<input type="file" class="p-file">
<input type="number" class="p-qty" value="1">
</div>
</div>

<button class="btn" onclick="addPerson()">+ Add Person</button>
<button class="btn" onclick="makePassport()">GENERATE SHEET</button>
</div>

<!-- JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// FILE READ
function readFile(file){
return new Promise(res=>{
const r=new FileReader();
r.onload=e=>res(e.target.result);
r.readAsDataURL(file);
});
}

// MOBILE SAFE DOWNLOAD
function download(url,name){
const a=document.createElement("a");
a.href=url;
a.download=name;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
}

// PDF
async function generatePDF(){
const files=document.getElementById("pdfInput").files;
if(files.length===0) return alert("Select images");

const {jsPDF}=window.jspdf;
let pdf;

for(let i=0;i<files.length;i++){
const data=await readFile(files[i]);
const img=new Image();
img.src=data;
await new Promise(r=>img.onload=r);

const format = files[i].type.includes('png') ? 'PNG' : 'JPEG';

if(i===0){
pdf=new jsPDF({
orientation: img.width>img.height?'l':'p',
unit:'px',
format:[img.width,img.height]
});
}else{
pdf.addPage([img.width,img.height]);
}

pdf.addImage(data,format,0,0,img.width,img.height);
}

pdf.save("D-Studio.pdf");
}

// RESIZE
async function resizeByKB(){
const file=document.getElementById("resizeInput").files[0];
const targetKB=document.getElementById("targetKB").value;

if(!file || !targetKB) return alert("Fill all fields");

const data=await readFile(file);
const img=new Image();
img.src=data;

img.onload=()=>{
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);

let quality=0.9;
let result;

do{
result=canvas.toDataURL("image/jpeg",quality);
quality-=0.05;
}while((result.length/1024)>targetKB && quality>0.1);

download(result,"resized.jpg");
};
}

// ADD PERSON
function addPerson(){
const div=document.createElement("div");
div.className="person";
div.innerHTML=`
<input type="file" class="p-file">
<input type="number" class="p-qty" value="1">
`;
document.getElementById("peopleList").appendChild(div);
}

// PASSPORT
async function makePassport(){
const files=document.querySelectorAll(".p-file");
const qtys=document.querySelectorAll(".p-qty");

const canvas=document.createElement("canvas");
canvas.width=2480;
canvas.height=3508;

const ctx=canvas.getContext("2d");
ctx.fillStyle="#fff";
ctx.fillRect(0,0,canvas.width,canvas.height);

let x=80, y=100;
const w=413, h=531;

for(let i=0;i<files.length;i++){
if(files[i].files[0]){
const data=await readFile(files[i].files[0]);
const img=new Image();
img.src=data;
await new Promise(r=>img.onload=r);

for(let j=0;j<qtys[i].value;j++){
if(x+w>2400){ x=80; y+=h+50; }
ctx.drawImage(img,x,y,w,h);
x+=w+40;
}
}
}

download(canvas.toDataURL("image/jpeg",0.95),"passport.jpg");
}

</script>

</body>
</html>
