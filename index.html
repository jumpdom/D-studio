<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D Studio | Premium Workspace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --accent: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(56, 189, 248, 0.2);
            --whatsapp: #25D366;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
        }

        nav {
            padding: 15px;
            text-align: center;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .logo-text { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 26px; 
            font-weight: 700; 
            color: var(--accent); 
            letter-spacing: -1px;
        }

        .container { max-width: 500px; margin: 30px auto; padding: 0 20px; }

        .tool-card {
            background: var(--card);
            border-radius: 28px;
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .tool-group label { 
            display: block; 
            font-size: 15px;
            font-weight: 900; 
            color: var(--accent); 
            text-transform: uppercase; 
            margin-bottom: 12px; 
            font-family: 'Space Grotesk', sans-serif;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            color: white;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #030712;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .whatsapp-btn {
            background: var(--whatsapp);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 10px;
        }

        .photo-entry {
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 15px;
            border: 1px dashed var(--border);
        }

        footer { background: #000; padding: 30px; text-align: center; border-top: 1px solid var(--border); margin-top: 40px; }
        .copyright { color: #475569; font-size: 11px; font-weight: 700; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <img src="IMG_6145.jpeg" alt="Logo" style="width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent);">
            <div class="logo-text">D STUDIO</div>
        </div>
    </nav>

    <div class="container">
        <div class="tool-card">
            <div class="tool-group">
                <label>📄 Image to PDF</label>
                <input type="file" id="pdfInput" accept="image/*" multiple>
                <button onclick="convertToPDF()">Export PDF</button>
            </div>
        </div>

        <div class="tool-card">
            <div class="tool-group">
                <label>🖼️ Print Sheet Maker</label>
                <div id="photoContainer">
                    <div class="photo-entry">
                        <input type="file" class="p-input" accept="image/*">
                        <select class="p-size">
                            <option value="passport">Passport Size</option>
                            <option value="aadhar">Aadhar Card Size</option>
                            <option value="stamp">Stamp Size</option>
                        </select>
                        <input type="number" class="p-qty" value="12">
                    </div>
                </div>
                <button style="background:transparent; border:1px solid var(--accent); color:var(--accent); margin-bottom:10px;" onclick="addPhotoSlot()">+ Add More Photo</button>
                <button onclick="generateMultiPrint()">Create A4 Sheet</button>
            </div>
        </div>

        <div class="tool-card" style="text-align: center;">
            <label>Help & Support</label>
            <a href="https://wa.me/918521694137?text=Hello%20D%20Studio,%20I%20need%20help." class="whatsapp-btn">
                <span>💬 WhatsApp: 8521694137</span>
            </a>
        </div>
    </div>

    <footer>
        <div class="copyright">© 2026 D STUDIO • AMIT DAS</div>
    </footer>

<script>
    const readFile = (file) => new Promise(res => {
        const reader = new FileReader();
        reader.onload = (e) => res(e.target.result);
        reader.readAsDataURL(file);
    });

    function addPhotoSlot() {
        const div = document.createElement('div');
        div.className = 'photo-entry';
        div.innerHTML = `<input type="file" class="p-input" accept="image/*"><select class="p-size"><option value="passport">Passport</option><option value="aadhar">Aadhar</option><option value="stamp">Stamp</option></select><input type="number" class="p-qty" value="4">`;
        document.getElementById('photoContainer').appendChild(div);
    }

    async function convertToPDF() {
        const files = document.getElementById('pdfInput').files;
        if (!files.length) return alert("Select images!");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        for (let i = 0; i < files.length; i++) {
            const imgData = await readFile(files[i]);
            if (i > 0) doc.addPage();
            doc.addImage(imgData, 'JPEG', 10, 10, 190, 277);
        }
        doc.save("D_Studio_Doc.pdf");
    }

    async function generateMultiPrint() {
        const slots = document.querySelectorAll('.photo-entry'), canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
        canvas.width = 2480; canvas.height = 3508; ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        let curX = 120, curY = 120, gap = 50, margin = 120;
        for (const slot of slots) {
            const file = slot.querySelector('.p-input').files[0], sizeType = slot.querySelector('.p-size').value, qty = parseInt(slot.querySelector('.p-qty').value) || 0;
            if (!file) continue;
            const img = new Image(); img.src = await readFile(file);
            await new Promise(r => img.onload = r);
            let pW = (sizeType==='passport')?413:(sizeType==='aadhar'?600:236), pH = (sizeType==='passport')?531:(sizeType==='aadhar'?900:295);
            for (let i = 0; i < qty; i++) {
                if (curX + pW > canvas.width - margin) { curX = margin; curY += pH + gap; }
                ctx.drawImage(img, curX, curY, pW, pH);
                ctx.strokeStyle = "#ddd"; ctx.strokeRect(curX, curY, pW, pH);
                curX += pW + gap;
            }
            curX = margin; curY += pH + gap;
        }
        const link = document.createElement('a'); link.href = canvas.toDataURL("image/jpeg", 0.9); link.download = "D_Studio_Print.jpg"; link.click();
    }
</script>
</body>
</html>
