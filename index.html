<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D Studio - Image Tools</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body { background:#0d0d0d; color:#fff; font-family:Arial; margin:0; text-align:center; }
header { background:#1a1a1a; padding:15px; border-bottom:2px solid #ffcc00; }

.brand-name { color:#ffcc00; font-size:26px; font-weight:bold; }
.container { max-width:800px; margin:20px auto; padding:10px; }

.tool-box { background:#1a1a1a; padding:20px; border-radius:10px; margin-bottom:20px; }
.btn { background:#ffcc00; padding:12px; border:none; width:100%; margin-top:10px; cursor:pointer; }

input { width:100%; padding:10px; margin-top:10px; }

.person-entry { background:#222; padding:10px; margin-top:10px; }

</style>
</head>

<body>

<header>
<img src="IMG_6239.jpeg" width="60"><br>
<div class="brand-name">D STUDIO</div>
<img src="IMG_6145.jpeg" width="80">
</header>

<div class="container">

<!-- PDF -->
<div class="tool-box">
<h3>Image → PDF</h3>
<input type="file" id="pdfInput" multiple accept="image/*">
<button class="btn" onclick="generatePDF()">Download PDF</button>
</div>

<!-- Resize -->
<div class="tool-box">
<h3>Resize Image (KB)</h3>
<input type="file" id="resizeInput" accept="image/*">
<input type="number" id="targetKB" placeholder="Enter KB (e.g. 50)">
<button class="btn" onclick="resizeByKB()">Download Image</button>
</div>

<!-- Passport -->
<div class="tool-box">
<h3>Passport Photo Sheet</h3>

<div id="peopleList">
<div class="person-entry">
<input type="file" class="p-file">
<input type="number" class="p-qty" value="1">
</div>
</div>

<button class="btn" onclick="addPerson()">+ Add Person</button>
<button class="btn" onclick="makePassport()">Generate Sheet</button>
</div>

</div>

<!-- JS PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// READ FILE
function readFile(file){
return new Promise(res=>{
const r=new FileReader();
r.onload=e=>res(e.target.result);
r.readAsDataURL(file);
});
}

// DOWNLOAD FIX (mobile supported)
function download(url,name){
const a=document.createElement("a");
a.href=url;
a.download=name;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
}

// PDF
async function generatePDF(){
const files=document.getElementById("pdfInput").files;
if(files.length===0) return alert("Select images");

const {jsPDF}=window.jspdf;
let pdf;

for(let i=0;i<files.length;i++){
const data=await readFile(files[i]);
const img=new Image();
img.src=data;

await new Promise(r=>img.onload=r);

const format = files[i].type.includes('png') ? 'PNG' : 'JPEG';

if(i===0){
pdf=new jsPDF({
orientation: img.width>img.height?'l':'p',
unit:'px',
format:[img.width,img.height]
});
}else{
pdf.addPage([img.width,img.height]);
}

pdf.addImage(data,format,0,0,img.width,img.height);
}

pdf.save("D-Studio.pdf");
}

// RESIZE
async function resizeByKB(){
const file=document.getElementById("resizeInput").files[0];
const targetKB=document.getElementById("targetKB").value;

if(!file || !targetKB) return alert("Fill all fields");

const data=await readFile(file);
const img=new Image();
img.src=data;

img.onload=()=>{
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);

let quality=0.9;
let result;

do{
result=canvas.toDataURL("image/jpeg",quality);
quality-=0.05;
}while((result.length/1024)>targetKB && quality>0.1);

download(result,"resized.jpg");
};
}

// ADD PERSON
function addPerson(){
const div=document.createElement("div");
div.className="person-entry";
div.innerHTML=`
<input type="file" class="p-file">
<input type="number" class="p-qty" value="1">
`;
document.getElementById("peopleList").appendChild(div);
}

// PASSPORT
async function makePassport(){
const files=document.querySelectorAll(".p-file");
const qtys=document.querySelectorAll(".p-qty");

const canvas=document.createElement("canvas");
canvas.width=2480;
canvas.height=3508;

const ctx=canvas.getContext("2d");
ctx.fillStyle="#fff";
ctx.fillRect(0,0,canvas.width,canvas.height);

let x=80, y=100;
const w=413, h=531;

for(let i=0;i<files.length;i++){
if(files[i].files[0]){
const data=await readFile(files[i].files[0]);
const img=new Image();
img.src=data;
await new Promise(r=>img.onload=r);

for(let j=0;j<qtys[i].value;j++){
if(x+w>2400){ x=80; y+=h+50; }
ctx.drawImage(img,x,y,w,h);
x+=w+40;
}
}
}

download(canvas.toDataURL("image/jpeg",0.95),"passport.jpg");
}

</script>

</body>
</html>
