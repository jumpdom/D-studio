<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Dark Dashboard</title>
    <style>
        /* Base Styles */
        body {
            background-color: #0f172a; /* Deep Navy Black */
            color: #f8fafc; /* Soft White */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navigation Bar */
        nav {
            width: 100%;
            padding: 20px 0;
            background: #1e293b;
            text-align: center;
            border-bottom: 2px solid #38bdf8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        nav a {
            color: #38bdf8;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Container Section */
        .container {
            max-width: 900px;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        /* Feature Card Section */
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 30px;
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.2);
        }

        .card h2 {
            margin-top: 0;
            color: #38bdf8;
        }

        /* Neon Action Button */
        .btn {
            display: inline-block;
            margin-top: 20px;
            background-color: #38bdf8;
            color: #0f172a;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #0ea5e9;
            box-shadow: 0 0 15px #38bdf8;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Services</a>
    </nav>

    <div class="container">
        <h1>Welcome to My Workspace</h1>
        <p class="subtitle">Clean, Fast, and Secure Design</p>

        <div class="card">
            <h2>Project Status</h2>
            <p>Aapka naya theme ab active hai. Ye design dark environment mein kaam karne ke liye best hai aur aankhon par zor nahi dalta.</p>
            <a href="#" class="btn">Explore More</a>
        </div>
    </div>

</body>
</html>
