<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D Studio | Professional Workspace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --accent: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(56, 189, 248, 0.2);
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
        }

        nav {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; color: var(--accent); }

        .container { max-width: 500px; margin: 30px auto; padding: 0 20px; }

        .tool-card {
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .tool-group label { display: block; font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }

        input, select {
            width: 100%;
            padding: 14px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            color: white;
            margin-bottom: 12px;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #030712;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }

        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-bottom: 10px; }

        .photo-entry {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px dashed var(--border);
        }

        footer { background: #000; padding: 40px 20px; border-top: 1px solid var(--border); text-align: center; margin-top: 50px; }
        .legal-box { max-width: 800px; margin: 0 auto; text-align: left; font-size: 11px; color: var(--text-secondary); display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .legal-title { color: var(--text-primary); font-weight: 700; margin-bottom: 5px; font-size: 13px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">D STUDIO</div>
        <div class="nav-links" style="display: flex; gap: 15px; font-size: 14px;">
            <a href="#" style="color: var(--text-secondary); text-decoration: none;">Home</a>
            <a href="#" style="color: var(--text-secondary); text-decoration: none;">Tools</a>
        </div>
    </nav>

    <div class="container">
        <div class="tool-card">
            <div class="tool-group">
                <label>📄 Image to PDF Converter</label>
                <input type="file" id="pdfInput" accept="image/*" multiple>
                <button onclick="convertToPDF()">Export to PDF</button>
            </div>
        </div>

        <div class="tool-card">
            <div class="tool-group">
                <label>⚖️ Exact KB Resizer</label>
                <input type="file" id="kbInput" accept="image/*">
                <input type="number" id="targetKB" placeholder="Target Size (KB)">
                <button onclick="resizeKB()">Optimize Size</button>
            </div>
        </div>

        <div class="tool-card">
            <div class="tool-group">
                <label>🖼️ Multi-Size Print Sheet</label>
                <div id="photoContainer">
                    <div class="photo-entry">
                        <label>Person 1 Photo</label>
                        <input type="file" class="p-input" accept="image/*">
                        <select class="p-size">
                            <option value="passport">Passport (3.5x4.5 cm)</option>
                            <option value="aadhar">Aadhar Card Size</option>
                            <option value="stamp">Stamp Size</option>
                        </select>
                        <input type="number" class="p-qty" value="12" placeholder="Quantity">
                    </div>
                </div>
                <button class="btn-outline" onclick="addPhotoSlot()">+ Add Another Person</button>
                <button onclick="generateMultiPrint()">Create A4 Print Sheet</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="legal-box">
            <div><div class="legal-title">Disclaimer</div>D Studio processing happens locally. Private photos are never uploaded to servers.</div>
            <div><div class="legal-title">Terms & Conditions</div>Accuracy depends on source quality and browser performance.</div>
        </div>
        <div style="margin-top: 20px; font-size: 11px; color: #475569;">© 2026 D STUDIO • AMIT DAS</div>
    </footer>

<script>
    const readFile = (file) => new Promise(res => {
        const reader = new FileReader();
        reader.onload = (e) => res(e.target.result);
        reader.readAsDataURL(file);
    });

    function addPhotoSlot() {
        const div = document.createElement('div');
        div.className = 'photo-entry';
        div.innerHTML = `<label>Next Person Photo</label><input type="file" class="p-input" accept="image/*"><select class="p-size"><option value="passport">Passport</option><option value="aadhar">Aadhar Card</option><option value="stamp">Stamp</option></select><input type="number" class="p-qty" value="4">`;
        document.getElementById('photoContainer').appendChild(div);
    }

    async function convertToPDF() {
        const files = document.getElementById('pdfInput').files;
        if (!files.length) return alert("Select images!");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        for (let i = 0; i < files.length; i++) {
            const imgData = await readFile(files[i]);
            if (i > 0) doc.addPage();
            doc.addImage(imgData, 'JPEG', 10, 10, 190, 277);
        }
        doc.save("D_Studio_Doc.pdf");
    }

    async function resizeKB() {
        const file = document.getElementById('kbInput').files[0], target = parseInt(document.getElementById('targetKB').value);
        if (!file || !target) return alert("Details bhariye!");
        const img = new Image(); img.src = await readFile(file);
        img.onload = function() {
            let canvas = document.createElement('canvas'), ctx = canvas.getContext('2d'), scale = 1.0, finalData = "";
            for (let i = 0; i < 6; i++) {
                canvas.width = img.width * scale; canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                for (let q = 0.98; q > 0.1; q -= 0.05) {
                    finalData = canvas.toDataURL("image/jpeg", q);
                    if ((finalData.length * 3 / 4 / 1024) <= target) break;
                }
                if ((finalData.length * 3 / 4 / 1024) < target * 0.85) scale += 0.4; else break;
            }
            const link = document.createElement('a'); link.href = finalData; link.download = `D_Studio_${target}KB.jpg`; link.click();
        };
    }

    async function generateMultiPrint() {
        const slots = document.querySelectorAll('.photo-entry'), canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
        canvas.width = 2480; canvas.height = 3508; ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        let curX = 120, curY = 120, gap = 50, margin = 120;

        for (const slot of slots) {
            const file = slot.querySelector('.p-input').files[0], sizeType = slot.querySelector('.p-size').value, qty = parseInt(slot.querySelector('.p-qty').value) || 0;
            if (!file) continue;
            const img = new Image(); img.src = await readFile(file);
            await new Promise(r => img.onload = r);
            let pW = (sizeType==='passport')?413:(sizeType==='aadhar'?600:236), pH = (sizeType==='passport')?531:(sizeType==='aadhar'?900:295);
            for (let i = 0; i < qty; i++) {
                if (curX + pW > canvas.width - margin) { curX = margin; curY += pH + gap; }
                ctx.drawImage(img, curX, curY, pW, pH);
                ctx.strokeStyle = "#ddd"; ctx.strokeRect(curX, curY, pW, pH);
                curX += pW + gap;
            }
            curX = margin; curY += pH + gap;
        }
        const link = document.createElement('a'); link.href = canvas.toDataURL("image/jpeg", 0.9); link.download = "D_Studio_Print.jpg"; link.click();
    }
</script>
</body>
</html>
