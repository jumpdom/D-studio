<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Search Title & Description -->
    <title>Website Developer | Photo Editing | Video Editing Free</title>
    <meta name="description" content="D Studio by Amit Das: Free professional tools for Website Development, Photo Editing, and Video Editing. Fast Image to PDF converter.">

    <!-- Favicon (Earth icon hatane ke liye) -->
    <link rel="shortcut icon" type="image/jpeg" href="IMG_6145.jpeg">
    <link rel="icon" type="image/jpeg" href="IMG_6145.jpeg">
    <link rel="apple-touch-icon" href="IMG_6145.jpeg">

    <!-- Google Verification (HATAna MAT) -->
    <meta name="google-site-verification" content="YAHAN_APNA_PURANA_CODE_DAALEIN" />

    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* Aapka purana CSS yahan rahega */
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .preview-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .preview-image { width: 150px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>D Studio - Image to PDF</h1>
    <input type="file" id="fileInput" multiple accept="image/*">
    <div class="preview-container" id="preview"></div>
    <button onclick="generatePDF()">Generate PDF</button>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');

        fileInput.addEventListener('change', () => {
            preview.innerHTML = '';
            Array.from(fileInput.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-image';
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        async function generatePDF() {
            const images = document.querySelectorAll('.preview-image');
            if (images.length === 0) return alert("Pehle photo select karein!");

            const { jsPDF } = window.jspdf;
            let pdf;

            for (let i = 0; i < images.length; i++) {
                const imgElement = images[i];
                
                // Image load hone ka intezaar karein
                const img = new Image();
                img.src = imgElement.src;
                await new Promise(resolve => img.onload = resolve);

                const imgWidth = img.naturalWidth;
                const imgHeight = img.naturalHeight;
                const orientation = imgWidth > imgHeight ? 'l' : 'p';

                if (i === 0) {
                    pdf = new jsPDF({
                        orientation: orientation,
                        unit: 'px',
                        format: [imgWidth, imgHeight]
                    });
                } else {
                    pdf.addPage([imgWidth, imgHeight], orientation);
                }

                pdf.addImage(img, 'JPEG', 0, 0, imgWidth, imgHeight);
            }

            pdf.save("D-Studio-Generated.pdf");
        }
    </script>
</body>
</html>
