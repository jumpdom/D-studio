<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D Studio | Premium Workspace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --accent: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(56, 189, 248, 0.2);
            --whatsapp: #25D366;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* HEADER DESIGN - CENTERED LOGO */
        nav {
            padding: 20px;
            text-align: center;
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        /* STYLISH LOGO ICON */
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #0ea5e9);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #030712;
            font-size: 20px;
            box-shadow: 0 0 15px var(--border);
        }

        .logo-text { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 28px; 
            font-weight: 700; 
            color: var(--accent); 
            letter-spacing: -1px;
        }

        .container { max-width: 520px; margin: 30px auto; padding: 0 20px; }

        /* TYPOGRAPHY UPGRADE */
        .tool-card {
            background: var(--card);
            border-radius: 28px;
            padding: 30px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .tool-group label { 
            display: block; 
            font-size: 16px;
            font-weight: 900; 
            color: var(--accent); 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            letter-spacing: 1.5px;
            font-family: 'Space Grotesk', sans-serif;
        }

        input, select {
            width: 100%;
            padding: 16px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 14px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: #030712;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px var(--accent); }

        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); margin-bottom: 12px; }

        /* WHATSAPP HELP BUTTON */
        .whatsapp-btn {
            background: var(--whatsapp);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            border-radius: 14px;
            font-weight: 700;
            margin-top: 10px;
            transition: 0.3s;
        }

        .whatsapp-btn:hover { filter: brightness(1.1); transform: scale(1.02); }

        .photo-entry {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px dashed var(--border);
        }

        footer { 
            background: #000; 
            padding: 40px 20px; 
            border-top: 1px solid var(--border); 
            text-align: center; 
            margin-top: 50px; 
        }

        .legal-box { 
            max-width: 800px; 
            margin: 0 auto; 
            text-align: left; 
            font-size: 12px; 
            color: var(--text-secondary); 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }

        .copyright { margin-top: 30px; font-weight: 700; color: #475569; letter-spacing: 1px; font-size: 11px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <div class="logo-icon">D</div>
            <div class="logo-text">STUDIO</div>
        </div>
    </nav>

    <div class="container">
        <div class="tool-card">
            <div class="tool-group">
                <label>📄 Image to PDF</label>
                <input type="file" id="pdfInput" accept="image/*" multiple>
                <button onclick="convertToPDF()">Export PDF</button>
            </div>
        </div>

        <div class="tool-card">
            <div class="tool-group">
                <label>🖼️ Print Sheet Maker</label>
                <div id="photoContainer">
                    <div class="photo-entry">
                        <label style="font-size: 11px; color: var(--text-secondary);">Add Person Photo</label>
                        <input type="file" class="p-input" accept="image/*">
                        <select class="p-size">
                            <option value="passport">Passport Size</option>
                            <option value="aadhar">Aadhar Card Size</option>
                            <option value="stamp">Stamp Size</option>
                        </select>
                        <input type="number" class="p-qty" value="12">
                    </div>
                </div>
                <button class="btn-outline" onclick="addPhotoSlot()">+ Add More Photo</button>
                <button onclick="generateMultiPrint()">Create A4 Sheet</button>
            </div>
        </div>

        <div class="tool-card">
            <div class="tool-group">
                <label>⚖️ Size Compressor</label>
                <input type="file" id="kbInput" accept="image/*">
                <input type="number" id="targetKB" placeholder="Enter Target KB">
                <button onclick="resizeKB()">Optimize Image</button>
            </div>
        </div>

        <div class="tool-card" style="text-align: center;">
            <div class="tool-group">
                <label>Need Help?</label>
                <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 15px;">Facing issues? Chat with us directly.</p>
                <a href="https://wa.me/918521694137?text=Hello%20D%20Studio,%20I%20need%20help." class="whatsapp-btn">
                    <span>💬 WhatsApp Support</span>
                </a>
            </div>
        </div>
    </div>

    <footer>
        <div class="legal-box">
            <div><b>Security:</b> All processing is local. Your files never leave your device.</div>
            <div><b>Support:</b> For custom solutions, contact via WhatsApp.</div>
        </div>
        <div class="copyright">© 2026 D STUDIO • PROFESSIONAL WORKSPACE</div>
    </footer>

<script>
    const readFile = (file) => new Promise(res => {
        const reader = new FileReader();
        reader.onload = (e) => res(e.target.result);
        reader.readAsDataURL(file);
    });

    function addPhotoSlot() {
        const div = document.createElement('div');
        div.className = 'photo-entry';
        div.innerHTML = `<label style="font-size: 11px; color: var(--text-secondary);">Next Person Setup</label><input type="file" class="p-input" accept="image/*"><select class="p-size"><option value="passport">Passport</option><option value="aadhar">Aadhar</option><option value="stamp">Stamp</option></select><input type="number" class="p-qty" value="4">`;
        document.getElementById('photoContainer').appendChild(div);
    }

    async function convertToPDF() {
        const files = document.getElementById('pdfInput').files;
        if (!files.length) return alert("Select images!");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        for (let i = 0; i < files.length; i++) {
            const imgData = await readFile(files[i]);
            if (i > 0) doc.addPage();
            doc.addImage(imgData, 'JPEG', 10, 10, 190, 277);
        }
        doc.save("D_Studio_Doc.pdf");
    }

    async function resizeKB() {
        const file = document.getElementById('kbInput').files[0], target = parseInt(document.getElementById('targetKB').value);
        if (!file || !target) return alert("Fill details!");
        const img = new Image(); img.src = await readFile(file);
        img.onload = function() {
            let canvas = document.createElement('canvas'), ctx = canvas.getContext('2d'), scale = 1.0, finalData = "";
            for (let i = 0; i < 6; i++) {
                canvas.width = img.width * scale; canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                for (let q = 0.98; q > 0.1; q -= 0.05) {
                    finalData = canvas.toDataURL("image/jpeg", q);
                    if ((finalData.length * 3 / 4 / 1024) <= target) break;
                }
                if ((finalData.length * 3 / 4 / 1024) < target * 0.85) scale += 0.4; else break;
            }
            const link = document.createElement('a'); link.href = finalData; link.download = `D_Studio_${target}KB.jpg`; link.click();
        };
    }

    async function generateMultiPrint() {
        const slots = document.querySelectorAll('.photo-entry'), canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
        canvas.width = 2480; canvas.height = 3508; ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        let curX = 120, curY = 120, gap = 50, margin = 120;
        for (const slot of slots) {
            const file = slot.querySelector('.p-input').files[0], sizeType = slot.querySelector('.p-size').value, qty = parseInt(slot.querySelector('.p-qty').value) || 0;
            if (!file) continue;
            const img = new Image(); img.src = await readFile(file);
            await new Promise(r => img.onload = r);
            let pW = (sizeType==='passport')?413:(sizeType==='aadhar'?600:236), pH = (sizeType==='passport')?531:(sizeType==='aadhar'?900:295);
            for (let i = 0; i < qty; i++) {
                if (curX + pW > canvas.width - margin) { curX = margin; curY += pH + gap; }
                ctx.drawImage(img, curX, curY, pW, pH);
                ctx.strokeStyle = "#ddd"; ctx.strokeRect(curX, curY, pW, pH);
                curX += pW + gap;
            }
            curX = margin; curY += pH + gap;
        }
        const link = document.createElement('a'); link.href = canvas.toDataURL("image/jpeg", 0.9); link.download = "D_Studio_Print.jpg"; link.click();
    }
</script>
</body>
</html>
